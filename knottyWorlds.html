<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        input {
            position: fixed;
            z-index: 100;
        }
        #imageLoader {
            top: 10px;
            left: 10px;
        }
        #textureLoader {
            top: 10px;
            left: 140px;
        }
        #colorPicker {
            top: 10px;
            left: 270px;
        }
        button {
            position: fixed;
            top: 10px;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
        }
        button:hover {
            background-color: #45a049;
        }
        button.active {
            background-color: #ff9800;
        }
        #stitchToolBtn {
            left: 370px;
        }
        #stitchColorBtn {
            left: 540px;
        }
        #exportBtn {
            left: 680px;
            background-color: #2196F3;
        }
        #exportBtn:hover {
            background-color: #0b7dda;
        }
        #clearStitchesBtn {
            left: 800px;
            background-color: #f44336;
        }
        #clearStitchesBtn:hover {
            background-color: #da190b;
        }
        .control-group {
            position: fixed;
            top: 50px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 4px;
            z-index: 100;
            color: white;
            font-size: 12px;
        }
        #stitchOpacitySlider {
            width: 150px;
        }
        #stitchThicknessSlider {
            width: 150px;
            margin-top: 10px;
        }
        .slider-label {
            display: block;
            margin-bottom: 5px;
        }
        #stitchColorPicker {
            position: fixed;
            top: 50px;
            left: 540px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            border: 2px solid white;
            border-radius: 4px;
            z-index: 100;
        }
        #exportModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }
        .modal-content {
            background-color: #333;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 300px;
            color: white;
            text-align: center;
        }
        .modal-content h2 {
            margin-top: 0;
        }
        .export-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .export-buttons button {
            position: static;
            margin: 0;
            padding: 8px 16px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: white;
        }
    </style>
</head>
<body>
    <!-- Upload Inputs -->
    <input type="file" id="imageLoader" accept="image/png" />
    <input type="file" id="textureLoader" accept="image/png" />
    <input type="color" id="colorPicker" value="#ff0000" />
    
    <!-- Stitch Tool Button -->
    <button id="stitchToolBtn">Stitch Tool (OFF)</button>
    
    <!-- Stitch Color Picker -->
    <input type="color" id="stitchColorPicker" value="#ff00ff" />
    
    <!-- Export Button -->
    <button id="exportBtn">Export</button>
    
    <!-- Clear Stitches Button -->
    <button id="clearStitchesBtn">Clear Stitches</button>
    
    <!-- Stitch Tool Controls -->
    <div class="control-group">
        <label class="slider-label">Opacity: <span id="opacityValue">0.8</span></label>
        <input type="range" id="stitchOpacitySlider" min="0.1" max="1" step="0.1" value="0.8" />
        
        <label class="slider-label">Thickness: <span id="thicknessValue">2</span></label>
        <input type="range" id="stitchThicknessSlider" min="1" max="10" step="1" value="2" />
    </div>

    <!-- Export Modal -->
    <div id="exportModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Export Options</h2>
            <p>Choose export format:</p>
            <div class="export-buttons">
                <button id="exportPNG">PNG</button>
                <button id="exportJSON">JSON</button>
            </div>
        </div>
    </div>

    <!-- Three.js Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, knitTexture, selectedThreadMaterial = null, selectedOutline = null;
        
        // Stitch Tool Variables
        let stitchToolActive = false;
        let stitchStartPoint = null;
        let stitchLine = null;
        let stitchGroup = new THREE.Group();
        let stitches = [];
        let raycaster = new THREE.Raycaster();
        let stitchOpacity = 0.8;
        let stitchThickness = 2;
        let stitchColor = 0xff00ff;
        let currentImage = null;

        // Initialize Three.js
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Add stitch group to scene
            scene.add(stitchGroup);

            // Add event listeners for pinch-to-zoom
            addPinchToZoom();

            // Add event listeners for thread color change
            addColorChangeHandler();
            
            // Add stitch tool functionality
            addStitchTool();
            
            // Add export functionality
            addExportFunctionality();
            
            animate();
        }

        // Add pinch-to-zoom controls
        function addPinchToZoom() {
            let initialDistance = null;

            function touchMoveHandler(event) {
                if (event.touches.length === 2) {
                    const touch1 = event.touches[0];
                    const touch2 = event.touches[1];

                    const currentDistance = Math.hypot(
                        touch2.pageX - touch1.pageX,
                        touch2.pageY - touch1.pageY
                    );

                    if (initialDistance == null) {
                        initialDistance = currentDistance;
                    } else {
                        const zoomFactor = currentDistance / initialDistance;
                        camera.zoom *= zoomFactor;
                        camera.updateProjectionMatrix();
                        initialDistance = currentDistance;
                    }
                }
            }

            function touchEndHandler() {
                initialDistance = null;
            }

            renderer.domElement.addEventListener('touchmove', touchMoveHandler);
            renderer.domElement.addEventListener('touchend', touchEndHandler);
            renderer.domElement.addEventListener('touchcancel', touchEndHandler);
        }

        // Add stitch tool functionality
        function addStitchTool() {
            const stitchToolBtn = document.getElementById('stitchToolBtn');
            const opacitySlider = document.getElementById('stitchOpacitySlider');
            const opacityValue = document.getElementById('opacityValue');
            const thicknessSlider = document.getElementById('stitchThicknessSlider');
            const thicknessValue = document.getElementById('thicknessValue');
            const stitchColorPicker = document.getElementById('stitchColorPicker');
            const clearStitchesBtn = document.getElementById('clearStitchesBtn');

            // Toggle stitch tool
            stitchToolBtn.addEventListener('click', () => {
                stitchToolActive = !stitchToolActive;
                stitchToolBtn.textContent = stitchToolActive ? 'Stitch Tool (ON)' : 'Stitch Tool (OFF)';
                stitchToolBtn.classList.toggle('active', stitchToolActive);
                if (!stitchToolActive) {
                    stitchStartPoint = null;
                }
            });

            // Update opacity
            opacitySlider.addEventListener('input', (e) => {
                stitchOpacity = parseFloat(e.target.value);
                opacityValue.textContent = stitchOpacity.toFixed(1);
                // Update existing stitches
                stitchGroup.children.forEach(child => {
                    updateStitchOpacity(child, stitchOpacity);
                });
            });

            // Update thickness
            thicknessSlider.addEventListener('input', (e) => {
                stitchThickness = parseInt(e.target.value);
                thicknessValue.textContent = stitchThickness;
            });

            // Update stitch color
            stitchColorPicker.addEventListener('change', (e) => {
                stitchColor = parseInt(e.target.value.replace('#', ''), 16);
            });

            // Clear stitches
            clearStitchesBtn.addEventListener('click', () => {
                stitchGroup.children.forEach(child => {
                    scene.remove(child);
                });
                stitchGroup.children.length = 0;
                stitches = [];
                stitchStartPoint = null;
                if (stitchLine) {
                    scene.remove(stitchLine);
                    stitchLine = null;
                }
            });

            // Mouse/touch events for stitching
            renderer.domElement.addEventListener('click', handleStitchClick);
            renderer.domElement.addEventListener('touchend', handleStitchClick);
            renderer.domElement.addEventListener('mousemove', handleStitchPreview);
            renderer.domElement.addEventListener('touchmove', handleStitchPreview);
        }

        // Update stitch opacity recursively
        function updateStitchOpacity(obj, opacity) {
            if (obj.material) {
                obj.material.opacity = opacity;
            }
            if (obj.children) {
                obj.children.forEach(child => updateStitchOpacity(child, opacity));
            }
        }

        // Handle stitch tool click
        function handleStitchClick(event) {
            if (!stitchToolActive) return;

            const pos = getPointerPosition(event);
            const intersect = raycastToGrid(pos);

            if (intersect) {
                if (!stitchStartPoint) {
                    // Start a new stitch
                    stitchStartPoint = intersect.point.clone();
                } else {
                    // Complete the stitch
                    drawDashedStitch(stitchStartPoint, intersect.point);
                    stitchStartPoint = null;
                    if (stitchLine) {
                        scene.remove(stitchLine);
                        stitchLine = null;
                    }
                }
            }
        }

        // Preview stitch line as user moves mouse
        function handleStitchPreview(event) {
            if (!stitchToolActive || !stitchStartPoint) return;

            const pos = getPointerPosition(event);
            const intersect = raycastToGrid(pos);

            if (intersect) {
                // Remove old preview line
                if (stitchLine) scene.remove(stitchLine);

                // Draw preview line
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array([
                    stitchStartPoint.x, stitchStartPoint.y, stitchStartPoint.z,
                    intersect.point.x, intersect.point.y, intersect.point.z
                ]);
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                const material = new THREE.LineBasicMaterial({
                    color: 0x00ff00,
                    linewidth: 1,
                    transparent: true,
                    opacity: 0.5
                });

                stitchLine = new THREE.Line(geometry, material);
                scene.add(stitchLine);
            }
        }

        // Get pointer position from mouse or touch event
        function getPointerPosition(event) {
            let clientX, clientY;

            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            const rect = renderer.domElement.getBoundingClientRect();
            return {
                x: ((clientX - rect.left) / rect.width) * 2 - 1,
                y: -((clientY - rect.top) / rect.height) * 2 + 1
            };
        }

        // Raycast to find intersection with grid
        function raycastToGrid(pointer) {
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            // Find intersection with a stitch plane (not the stitch lines)
            for (let i = 0; i < intersects.length; i++) {
                const obj = intersects[i].object;
                if (obj.geometry instanceof THREE.PlaneGeometry && !obj.isStitchLine) {
                    return intersects[i];
                }
            }

            return null;
        }

        // Draw dashed stitch line between two points
        function drawDashedStitch(start, end) {
            const distance = start.distanceTo(end);
            const segments = Math.ceil(distance / 0.5);

            const dashGroup = new THREE.Group();
            dashGroup.metadata = {
                start: { x: start.x, y: start.y, z: start.z },
                end: { x: end.x, y: end.y, z: end.z },
                color: stitchColor,
                opacity: stitchOpacity,
                thickness: stitchThickness
            };

            for (let i = 0; i < segments; i++) {
                const progress = i / segments;
                const nextProgress = (i + 1) / segments;

                const segStart = start.clone().lerp(end, progress);
                const segEnd = start.clone().lerp(end, nextProgress);

                // Draw dash
                const dashGeometry = new THREE.BufferGeometry();
                const dashPositions = new Float32Array([
                    segStart.x, segStart.y, segStart.z + 0.1,
                    segEnd.x, segEnd.y, segEnd.z + 0.1
                ]);
                dashGeometry.setAttribute('position', new THREE.BufferAttribute(dashPositions, 3));

                const dashMaterial = new THREE.LineBasicMaterial({
                    color: stitchColor,
                    linewidth: stitchThickness,
                    transparent: true,
                    opacity: stitchOpacity,
                    depthTest: true
                });

                const dashLine = new THREE.Line(dashGeometry, dashMaterial);
                dashLine.isStitchLine = true;
                dashGroup.add(dashLine);

                // Add connection points at intervals
                if (i % 3 === 0) {
                    const pointGeometry = new THREE.SphereGeometry(0.15, 8, 8);
                    const pointMaterial = new THREE.MeshBasicMaterial({
                        color: stitchColor,
                        transparent: true,
                        opacity: stitchOpacity
                    });
                    const pointMesh = new THREE.Mesh(pointGeometry, pointMaterial);
                    pointMesh.position.copy(segStart);
                    pointMesh.isStitchLine = true;
                    dashGroup.add(pointMesh);
                }
            }

            // Add end point
            const endGeometry = new THREE.SphereGeometry(0.15, 8, 8);
            const endMaterial = new THREE.MeshBasicMaterial({
                color: stitchColor,
                transparent: true,
                opacity: stitchOpacity
            });
            const endMesh = new THREE.Mesh(endGeometry, endMaterial);
            endMesh.position.copy(end);
            endMesh.isStitchLine = true;
            dashGroup.add(endMesh);

            stitchGroup.add(dashGroup);
            stitches.push(dashGroup);
        }

        // Add color change functionality with improved outline rendering
        function addColorChangeHandler() {
            const colorPicker = document.getElementById('colorPicker');

            function selectThread(event) {
                if (stitchToolActive) return;

                const rect = renderer.domElement.getBoundingClientRect();
                const pointer = {
                    x: ((event.touches[0].clientX - rect.left) / rect.width) * 2 - 1,
                    y: -((event.touches[0].clientY - rect.top) / rect.height) * 2 + 1
                };

                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(pointer, camera);

                const intersects = raycaster.intersectObjects(scene.children, true);

                if (intersects.length > 0) {
                    if (selectedOutline) {
                        scene.remove(selectedOutline);
                        selectedOutline = null;
                    }

                    const selectedObject = intersects[0].object;
                    selectedThreadMaterial = selectedObject.material;

                    const outlineGeometry = new THREE.EdgesGeometry(selectedObject.geometry);
                    const outlineMaterial = new THREE.LineBasicMaterial({
                        color: 0xffd700,
                        linewidth: 3,
                        depthTest: false
                    });
                    const outline = new THREE.LineSegments(outlineGeometry, outlineMaterial);

                    outline.position.copy(selectedObject.position);
                    outline.rotation.copy(selectedObject.rotation);
                    outline.scale.copy(selectedObject.scale);
                    outline.renderOrder = 999;

                    scene.add(outline);
                    selectedOutline = outline;

                    const selectedColor = selectedThreadMaterial.color.getStyle();
                    colorPicker.value = rgbToHex(selectedColor);
                }
            }

            function changeThreadColor(event) {
                if (selectedThreadMaterial) {
                    const newColor = event.target.value;
                    selectedThreadMaterial.color.set(newColor);
                }
            }

            function rgbToHex(rgbString) {
                const rgbArray = rgbString.match(/\d+/g).map(Number);
                return `#${rgbArray.map(v => v.toString(16).padStart(2, '0')).join('')}`;
            }

            renderer.domElement.addEventListener('touchstart', selectThread);
            colorPicker.addEventListener('change', changeThreadColor);
        }

        // Add export functionality
        function addExportFunctionality() {
            const exportBtn = document.getElementById('exportBtn');
            const exportModal = document.getElementById('exportModal');
            const closeBtn = document.querySelector('.close');
            const exportPNGBtn = document.getElementById('exportPNG');
            const exportJSONBtn = document.getElementById('exportJSON');

            exportBtn.addEventListener('click', () => {
                exportModal.style.display = 'block';
            });

            closeBtn.addEventListener('click', () => {
                exportModal.style.display = 'none';
            });

            window.addEventListener('click', (event) => {
                if (event.target === exportModal) {
                    exportModal.style.display = 'none';
                }
            });

            exportPNGBtn.addEventListener('click', () => {
                exportAsPNG();
                exportModal.style.display = 'none';
            });

            exportJSONBtn.addEventListener('click', () => {
                exportAsJSON();
                exportModal.style.display = 'none';
            });
        }

        // Export as PNG
        function exportAsPNG() {
            // Render the scene to ensure all stitches are visible
            renderer.render(scene, camera);
            
            // Get canvas data
            const canvas = renderer.domElement;
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `stitch-design-${new Date().getTime()}.png`;
                link.click();
                URL.revokeObjectURL(url);
            });
        }

        // Export as JSON
        function exportAsJSON() {
            const stitchData = {
                timestamp: new Date().toISOString(),
                stitches: stitches.map((stitch) => ({
                    metadata: stitch.metadata,
                    points: stitch.children
                        .filter(child => child instanceof THREE.Mesh && child.isStitchLine)
                        .map(mesh => ({
                            x: mesh.position.x,
                            y: mesh.position.y,
                            z: mesh.position.z,
                            type: mesh.geometry.type === 'SphereGeometry' ? 'node' : 'line'
                        }))
                }))
            };

            const dataStr = JSON.stringify(stitchData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `stitch-data-${new Date().getTime()}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // Handle texture loading
        function loadTexture(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const texture = new THREE.Texture(img);
                    texture.needsUpdate = true;
                    knitTexture = texture;
                };
            };
            reader.readAsDataURL(file);
        }

        // Create stitches from image
        function generateStitchesFromImage(imageData, imageWidth, imageHeight) {
            const group = new THREE.Group();
            const pixelSize = 1.0;

            for (let y = 0; y < imageHeight; y++) {
                for (let x = 0; x < imageWidth; x++) {
                    const pixelIndex = (y * imageWidth + x) * 4;

                    const r = imageData[pixelIndex];
                    const g = imageData[pixelIndex + 1];
                    const b = imageData[pixelIndex + 2];
                    const a = imageData[pixelIndex + 3];

                    if (a === 0) continue;

                    const geometry = new THREE.PlaneGeometry(1.5, 1.5);

                    const material = knitTexture
                        ? new THREE.MeshBasicMaterial({
                              map: knitTexture,
                              color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                              transparent: true,
                          })
                        : new THREE.MeshBasicMaterial({
                              color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                          });

                    const plane = new THREE.Mesh(geometry, material);

                    plane.position.set(
                        (x - imageWidth / 2) * pixelSize,
                        (imageHeight / 2 - y) * pixelSize,
                        0
                    );

                    group.add(plane);
                }
            }

            scene.add(group);
        }

        // Load image and process pixel data
        function loadPixelArt(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    canvas.width = img.width;
                    canvas.height = img.height;
                    context.drawImage(img, 0, 0);

                    const imageData = context.getImageData(0, 0, img.width, img.height).data;
                    generateStitchesFromImage(imageData, img.width, img.height);
                    currentImage = { width: img.width, height: img.height };
                };
            };
            reader.readAsDataURL(file);
        }

        // Event listeners for file uploads
        document.getElementById('imageLoader').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                loadPixelArt(file);
            }
        });

        document.getElementById('textureLoader').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                loadTexture(file);
            }
        });

        // Animation loop
        function animate() {
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // Adjust scene on window resize
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // Initialize Three.js
        init();
    </script>
</body>
</html>
